<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Ranking - Crystal Edition</title>
    
    <style>
        :root {
            /* Responsive sizes using vw (phone ke hisaab se auto-size) */
            --r1-box: 28vw; 
            --r-other-box: 20vw;
            --r1-podium-h: 110px;
            --r-other-podium-h: 80px;
            --crown-size: 12vw;
        }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000 url('oc.png') no-repeat center center fixed; background-size: cover; font-family: sans-serif; color: white; }
        
        .fixed-top-container { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; }
        .top-header { padding-top: calc(15px + env(safe-area-inset-top)); margin-bottom: 10px; text-align: center; }
        
        .main-tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; }
        .tab-item { font-size: 18px; font-weight: 600; color: #aaa; cursor: pointer; }
        .tab-item.active { color: #fff; border-bottom: 2px solid #ffd700; }
        
        .sub-tabs-container { display: flex; justify-content: center; margin: 0 auto; width: 85%; background: rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 2px; }
        .sub-tab { flex: 1; text-align: center; padding: 8px 0; border-radius: 25px; font-size: 14px; color: #ddd; }
        .sub-tab.active { background: linear-gradient(to right, #f8d478, #b8860b); color: #000; font-weight: bold; }
        
        /* Top 3 Section - Fixed Positioning for Mobile */
        .top-section { 
            display: flex; justify-content: center; align-items: flex-end; 
            padding: 0 10px 20px; min-height: 350px; width: 100%;
        }

        .podium-item { display: flex; flex-direction: column; align-items: center; position: relative; flex: 1; }

        /* Overlap logic taaki screen se bahar na jaye */
        .rank-1 { order: 2; z-index: 20; transform: scale(1.1); } 
        .rank-2 { order: 1; z-index: 10; margin-right: -5vw; } 
        .rank-3 { order: 3; z-index: 10; margin-left: -5vw; }
        
        .crown-image-container { width: var(--crown-size); height: var(--crown-size); z-index: 25; margin-bottom: -5px; }
        .crown-image { width: 100%; height: 100%; object-fit: contain; }

        .avatar-box { position: relative; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 5px; }
        .profile-img { border-radius: 50%; object-fit: cover; background: #333; z-index: 1; width: 70%; height: 70%; }
        .avatar-box::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-size: contain; background-repeat: no-repeat; z-index: 10; width: 180%; height: 180%; }
        
        .rank-1 .avatar-box { width: var(--r1-box); height: var(--r1-box); }
        .rank-1 .avatar-box::after { background-image: url('gold-frame.png'); }
        
        .rank-2 .avatar-box, .rank-3 .avatar-box { width: var(--r-other-box); height: var(--r-other-box); }
        .rank-2 .avatar-box::after { background-image: url('silver-frame.png'); }
        .rank-3 .avatar-box::after { background-image: url('bronze-frame.png'); }

        .podium-base { 
            position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.4); z-index: 6; width: 100%;
            clip-path: polygon(10% 0%, 90% 0%, 100% 20%, 100% 100%, 0% 100%, 0% 20%);
        }

        .rank-1 .podium-base { background: linear-gradient(135deg, #bf953f, #fcf6ba); height: var(--r1-podium-h); }
        .rank-2 .podium-base { background: linear-gradient(135deg, #a8a8a8, #ffffff); height: var(--r-other-podium-h); }
        .rank-3 .podium-base { background: linear-gradient(135deg, #a0522d, #ffa07a); height: var(--r-other-podium-h); }

        .rank-list-scroll { position: absolute; top: 460px; bottom: 0; left: 0; right: 0; overflow-y: auto; padding: 0 12px 20px; }
        .list-item { display: flex; align-items: center; background: rgba(40,25,10,0.9); margin-bottom: 10px; padding: 12px; border-radius: 50px 15px 15px 50px; border: 1px solid rgba(184,134,11,0.4); }
    </style>
</head>
<body>
    <div class="fixed-top-container">
        <div class="top-header">
            <div class="main-tabs">
                <div class="tab-item active">Rich list</div>
                <div class="tab-item">Charm</div>
            </div>
            <div class="sub-tabs-container">
                <div class="sub-tab active">Daily</div>
                <div class="sub-tab">Monthly</div>
            </div>
        </div>
        <div class="top-section" id="top3-container"></div>
    </div>
    <div class="rank-list-scroll" id="full-list"></div>

    <script>
        const data = [
            {name: "Admin User", points: 5000000},
            {name: "Top Player", points: 2500000},
            {name: "Elite Member", points: 1200000},
            {name: "Crystal Star", points: 950000}
        ];
        
        const top3Cont = document.getElementById('top3-container');
        const crownImages = ['golden.png', 'silver.png', 'bronze.png'];
        const classes = ["rank-1", "rank-2", "rank-3"];

        for(let i=0; i<3; i++) {
            const pts = (data[i].points / 1000).toFixed(1) + 'k';
            top3Cont.innerHTML += `
                <div class="podium-item ${classes[i]}">
                    <div class="crown-image-container"><img src="${crownImages[i]}" class="crown-image"></div>
                    <div class="avatar-box"><img src="https://ui-avatars.com/api/?name=${data[i].name}" class="profile-img"></div>
                    <div class="podium-base">
                        <span style="color:#000; font-weight:bold; font-size:12px;">${pts}</span>
                        <span style="color:#000; font-size:9px;">Diamond</span>
                    </div>
                    <p style="font-size:10px; margin-top:5px; font-weight:bold; text-align:center;">${data[i].name}</p>
                </div>`;
        }
    </script>
</body>
</html>
